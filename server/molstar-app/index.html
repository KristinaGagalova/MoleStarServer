<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MolStar Viewer</title>
  <link rel="stylesheet" href="molstar.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; overflow: hidden; }
    #login-modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #0d0d1a; display: flex; align-items: center; justify-content: center; z-index: 1000;
    }
    #login-box {
      background: #16213e; padding: 40px; border-radius: 12px; width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #login-box h1 { text-align: center; margin-bottom: 30px; color: #4fc3f7; font-size: 1.6em; }
    #login-box input {
      width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid #2d3a5a;
      border-radius: 6px; background: #0d1b2a; color: #e0e0e0; font-size: 1em;
    }
    #login-btn {
      width: 100%; padding: 12px; background: #4fc3f7; color: #0d0d1a; border: none;
      border-radius: 6px; font-size: 1em; font-weight: bold; cursor: pointer;
    }
    #login-btn:hover { background: #81d4fa; }
    #login-error { color: #ef5350; margin-top: 12px; text-align: center; font-size: 0.9em; min-height: 20px; }
    #app-container { display: none; width: 100%; height: 100vh; position: relative; }
    #molstar-container { width: calc(100% - 290px); height: 100%; }
    #side-panel {
      position: absolute; top: 0; right: 0; width: 290px; height: 100%;
      background: rgba(13,27,42,0.97); border-left: 1px solid #2d3a5a;
      display: flex; flex-direction: column; z-index: 100;
    }
    #panel-header {
      padding: 14px 16px; background: #16213e; border-bottom: 1px solid #2d3a5a;
      display: flex; justify-content: space-between; align-items: center;
    }
    #panel-header span { font-weight: bold; color: #4fc3f7; font-size: 1.1em; }
    #logout-btn {
      background: none; border: 1px solid #ef5350; color: #ef5350;
      padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8em;
    }
    #logout-btn:hover { background: #ef5350; color: white; }
    #user-info { padding: 8px 16px; font-size: 0.82em; color: #90a4ae; border-bottom: 1px solid #2d3a5a; }
    #panel-actions { padding: 10px 12px; display: flex; gap: 8px; border-bottom: 1px solid #2d3a5a; }
    #upload-btn, #save-btn {
      flex: 1; padding: 8px 4px; border-radius: 4px; border: none; cursor: pointer; font-size: 0.82em; font-weight: bold;
    }
    #upload-btn { background: #4fc3f7; color: #0d0d1a; }
    #upload-btn:hover { background: #81d4fa; }
    #save-btn { background: #66bb6a; color: #0d0d1a; }
    #save-btn:hover { background: #81c784; }
    #file-input { display: none; }
    #files-list { flex: 1; overflow-y: auto; padding: 8px; }
    #files-list h3 { font-size: 0.78em; color: #546e7a; padding: 8px 4px 4px; text-transform: uppercase; letter-spacing: 0.07em; }
    .file-item {
      padding: 9px 10px; margin-bottom: 4px; background: #16213e; border-radius: 6px;
      cursor: pointer; border: 1px solid transparent; transition: border-color 0.15s;
      display: flex; justify-content: space-between; align-items: center;
    }
    .file-item:hover { border-color: #4fc3f7; }
    .file-item.active { border-color: #4fc3f7; background: #0d2137; }
    .file-name { font-size: 0.82em; word-break: break-all; flex: 1; padding-right: 4px; }
    .file-delete {
      background: none; border: none; color: #ef5350; cursor: pointer;
      padding: 1px 5px; font-size: 1.1em; border-radius: 3px; opacity: 0.5; flex-shrink: 0;
    }
    .file-delete:hover { opacity: 1; background: rgba(239,83,80,0.15); }
    #status-bar { padding: 8px 14px; font-size: 0.75em; color: #90a4ae; border-top: 1px solid #2d3a5a; min-height: 32px; }
    #upload-progress { padding: 6px 14px; display: none; }
    #progress-bar { width: 100%; height: 6px; }
  </style>
</head>
<body>

<div id="login-modal">
  <div id="login-box">
    <h1>MolStar</h1>
    <input type="text" id="username" placeholder="Username" autocomplete="username">
    <input type="password" id="password" placeholder="Password" autocomplete="current-password">
    <button id="login-btn">Sign In</button>
    <div id="login-error"></div>
  </div>
</div>

<div id="app-container">
  <div id="molstar-container"></div>
  <div id="side-panel">
    <div id="panel-header">
      <span>My Files</span>
      <button id="logout-btn">Logout</button>
    </div>
    <div id="user-info"></div>
    <div id="panel-actions">
      <button id="upload-btn">+ Upload</button>
      <button id="save-btn">Save Session</button>
      <input type="file" id="file-input" accept=".pdb,.cif,.mmcif,.mol2,.sdf,.xyz,.ply,.dcd,.bcif,.ent,.gro">
    </div>
    <div id="files-list">
      <h3>Structures</h3>
      <div id="file-items"></div>
    </div>
    <div id="upload-progress"><progress id="progress-bar" max="100" value="0"></progress></div>
    <div id="status-bar">Connecting...</div>
  </div>
</div>

<script src="molstar.js"></script>
<script>
(async () => {
  let viewer = null;
  let currentUser = null;
  let activeFileId = null;

  function setStatus(msg) {
    document.getElementById('status-bar').textContent = msg;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function checkAuth() {
    try {
      const r = await fetch('/api/auth/me', { credentials: 'include' });
      if (r.ok) { currentUser = await r.json(); showApp(); }
      else showLogin();
    } catch { showLogin(); }
  }

  function showLogin() {
    document.getElementById('login-modal').style.display = 'flex';
    document.getElementById('app-container').style.display = 'none';
    setStatus('');
  }

  async function showApp() {
    document.getElementById('login-modal').style.display = 'none';
    document.getElementById('app-container').style.display = 'block';
    document.getElementById('user-info').textContent = 'Signed in as: ' + currentUser.username;
    setStatus('Loading viewer...');
    await initViewer();
    loadFiles();
  }

  async function initViewer() {
    viewer = await molstar.Viewer.create('molstar-container', {
      layoutIsExpanded: false,
      layoutShowControls: true,
      layoutShowRemoteState: false,
      layoutShowSequence: true,
      layoutShowLog: false,
      layoutShowLeftPanel: true,
      collapseLeftPanel: false,
      viewportShowExpand: true,
      viewportShowSelectionMode: false,
    });
    try {
      const sr = await fetch('/api/session', { credentials: 'include' });
      if (sr.ok) {
        const data = await sr.json();
        if (data && data.snapshot) {
          await viewer.plugin.state.setSnapshot(data.snapshot);
          setStatus('Session restored');
          return;
        }
      }
    } catch(e) {}
    setStatus('Ready');
  }

  document.getElementById('login-btn').addEventListener('click', async () => {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';
    if (!username || !password) { errEl.textContent = 'Enter username and password.'; return; }
    try {
      const r = await fetch('/api/auth/login', {
        method: 'POST', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await r.json();
      if (r.ok && data.ok) { currentUser = data.user; showApp(); }
      else errEl.textContent = data.error || 'Login failed.';
    } catch { errEl.textContent = 'Connection error.'; }
  });

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('login-btn').click();
  });

  document.getElementById('logout-btn').addEventListener('click', async () => {
    await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
    viewer = null; currentUser = null; activeFileId = null;
    showLogin();
  });

  async function loadFiles() {
    try {
      const r = await fetch('/api/files', { credentials: 'include' });
      if (!r.ok) return;
      const files = await r.json();
      const container = document.getElementById('file-items');
      container.innerHTML = '';
      if (files.length === 0) {
        container.innerHTML = '<div style="padding:10px;color:#546e7a;font-size:0.82em;">No files uploaded yet.</div>';
        return;
      }
      files.forEach(f => {
        const item = document.createElement('div');
        item.className = 'file-item' + (f.id === activeFileId ? ' active' : '');
        item.innerHTML = '<span class="file-name">' + esc(f.original_name) + '</span><button class="file-delete" title="Delete">×</button>';
        item.querySelector('.file-name').addEventListener('click', () => loadStructure(f));
        item.querySelector('.file-delete').addEventListener('click', async ev => {
          ev.stopPropagation();
          if (!confirm('Delete ' + f.original_name + '?')) return;
          await fetch('/api/files/' + f.id, { method: 'DELETE', credentials: 'include' });
          if (f.id === activeFileId) activeFileId = null;
          loadFiles();
        });
        container.appendChild(item);
      });
    } catch(e) { setStatus('Error loading files'); }
  }

  async function loadStructure(file) {
    if (!viewer) return;
    activeFileId = file.id;
    loadFiles();
    setStatus('Loading ' + file.original_name + '...');
    const ext = file.original_name.split('.').pop().toLowerCase();
    const fmtMap = { pdb:'pdb', ent:'pdb', cif:'mmcif', mmcif:'mmcif', bcif:'mmcif',
      mol2:'mol2', sdf:'sdf', xyz:'xyz', ply:'ply', dcd:'dcd', gro:'gro' };
    const format = fmtMap[ext] || 'pdb';
    const isBinary = (ext === 'bcif' || ext === 'dcd');
    try {
      await viewer.loadStructureFromUrl('/api/files/' + file.id, format, isBinary);
      setStatus('Loaded: ' + file.original_name);
    } catch(e) { setStatus('Error: ' + (e && e.message ? e.message : String(e))); }
  }

  document.getElementById('upload-btn').addEventListener('click', () => {
    document.getElementById('file-input').click();
  });

  document.getElementById('file-input').addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    const fd = new FormData();
    fd.append('file', file);
    setStatus('Uploading ' + file.name + '...');
    document.getElementById('upload-progress').style.display = 'block';
    const xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/files/upload');
    xhr.withCredentials = true;
    xhr.upload.onprogress = ev => {
      if (ev.lengthComputable) document.getElementById('progress-bar').value = (ev.loaded / ev.total * 100);
    };
    xhr.onload = () => {
      document.getElementById('upload-progress').style.display = 'none';
      document.getElementById('file-input').value = '';
      if (xhr.status === 200) { setStatus('Uploaded: ' + file.name); loadFiles(); }
      else setStatus('Upload failed (HTTP ' + xhr.status + ')');
    };
    xhr.onerror = () => { setStatus('Upload error'); document.getElementById('upload-progress').style.display = 'none'; };
    xhr.send(fd);
  });

  document.getElementById('save-btn').addEventListener('click', async () => {
    if (!viewer) return;
    setStatus('Saving session...');
    try {
      const snapshot = viewer.plugin.state.getSnapshot();
      const r = await fetch('/api/session', {
        method: 'PUT', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ snapshot })
      });
      const data = await r.json();
      setStatus(data.ok ? 'Session saved' : 'Save failed');
    } catch(e) { setStatus('Save error: ' + (e && e.message ? e.message : String(e))); }
  });

  checkAuth();
})();
</script>
</body>
</html>
